name: ndiscord
description: NDiscord - Discord-like chat with E2EE and AI noise suppression
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP & WebSocket
  http: ^1.2.1
  web_socket_channel: ^2.4.0

  # Storage
  flutter_secure_storage: ^9.2.2

  # Crypto
  cryptography: ^2.7.0
  pointycastle: ^3.9.1

  # WebRTC
  flutter_webrtc: ^0.11.7

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16

  # Utils
  uuid: ^4.5.1
  intl: ^0.19.0
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  path_provider: ^2.1.4

  # FFI for RNNoise
  ffi: ^2.1.3
  flutter_rust_bridge: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.9.0
  freezed: ^2.5.7
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
