name: ndiscord
description: NDiscord - Discord-like chat with E2EE and AI noise suppression
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP & WebSocket
  http: ^1.2.1
  web_socket_channel: ^2.4.0

  # Storage (web-compatible)
  flutter_secure_storage: ^9.2.2
  flutter_secure_storage_web: ^1.2.1

  # Crypto (pure Dart - works on web)
  cryptography: ^2.7.0

  # WebRTC
  flutter_webrtc: ^0.11.7

  # UI
  google_fonts: ^6.2.1

  # Utils
  uuid: ^4.5.1
  intl: ^0.19.0
  json_annotation: ^4.9.0
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
