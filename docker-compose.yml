version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ndiscord_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ndiscord
      POSTGRES_USER: ndiscord
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ndiscord_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ndiscord"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ndiscord

  redis:
    image: redis:7-alpine
    container_name: ndiscord_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ndiscord

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ndiscord-backend:latest
    container_name: ndiscord_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://ndiscord:${POSTGRES_PASSWORD:-ndiscord_secret}@postgres:5432/ndiscord
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-super-secret-key}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      CORS_ORIGINS: '["http://localhost","http://localhost:8080","http://${SERVER_IP:-localhost}"]'
      TURN_URL: ${TURN_URL:-stun:stun.l.google.com:19302}
      TURN_USERNAME: ${TURN_USERNAME:-turnuser}
      TURN_PASSWORD: ${TURN_PASSWORD:-turnpassword}
    networks:
      - ndiscord

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ndiscord-frontend:latest
    container_name: ndiscord_frontend
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - ndiscord

  coturn:
    image: coturn/coturn:latest
    container_name: ndiscord_coturn
    restart: unless-stopped
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49152-65535:49152-65535/udp"
    command:
      - -n
      - --lt-cred-mech
      - --fingerprint
      - --no-multicast-peers
      - --no-cli
      - --no-tlsv1
      - --no-tlsv1_1
      - --user=${TURN_USERNAME:-turnuser}:${TURN_PASSWORD:-turnpassword}
      - --realm=${TURN_REALM:-ndiscord.local}
    environment:
      DETECT_EXTERNAL_IP: "yes"
    networks:
      - ndiscord

volumes:
  postgres_data:
  redis_data:

networks:
  ndiscord:
    driver: bridge
