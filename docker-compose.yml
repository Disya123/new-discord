version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ndiscord_postgres
    environment:
      POSTGRES_DB: ndiscord
      POSTGRES_USER: ndiscord
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ndiscord_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ndiscord"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ndiscord_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ndiscord_backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://ndiscord:${POSTGRES_PASSWORD:-ndiscord_secret}@postgres:5432/ndiscord
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-super-secret-key}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:8080"]'
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  coturn:
    image: coturn/coturn:latest
    container_name: ndiscord_coturn
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49152-65535:49152-65535/udp"
    command:
      - -n
      - --lt-cred-mech
      - --fingerprint
      - --no-multicast-peers
      - --no-cli
      - --no-tlsv1
      - --no-tlsv1_1
      - --user=turnuser:turnpassword
      - --realm=ndiscord.local
    environment:
      DETECT_EXTERNAL_IP: "yes"

volumes:
  postgres_data:
  redis_data:
